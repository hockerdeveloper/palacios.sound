kind = "web"
previewPath = "/"
title = "Palacios Sound"
version = "1.0.0"
id = "artifacts/palacios-sound"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24281

[services.development]
run = "pnpm --filter @workspace/palacios-sound run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/palacios-sound", "run", "build" ]
publicDir = "artifacts/palacios-sound/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24281"
BASE_PATH = "/"
